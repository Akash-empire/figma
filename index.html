<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FleetPro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <header class="header">
        <button id="back-btn" class="back hidden" onclick="goBack()">
            <i data-lucide="arrow-left"></i>
        </button>
        <h1 id="title">Dashboard</h1>
        <div class="icons">
            <i data-lucide="search"></i>
            <i data-lucide="bell"></i>
        </div>
    </header>

    <!-- PAGES -->
    <main class="pages">

        <!-- DASHBOARD -->
        <section id="page-dashboard" class="page active">
            <div class="cards">
                <div class="card blue"><h3>12</h3><p>Active</p></div>
                <div class="card orange"><h3>3</h3><p>Alerts</p></div>
                <div class="card green"><h3>98%</h3><p>Fuel</p></div>
            </div>

            <div class="map-box">Live Map</div>
        </section>

        <!-- VEHICLES -->
        <section id="page-vehicles" class="page">
            <div class="list" id="vehicle-list"></div>
        </section>

        <!-- DETAIL -->
        <section id="page-detail" class="page">
            <div class="hero">
                <i data-lucide="truck" size="40"></i>
                <h2 id="v-name"></h2>
            </div>

            <div class="grid">
                <div class="box"><p>Fuel</p><h3 id="v-fuel"></h3></div>
                <div class="box"><p>Speed</p><h3 id="v-speed"></h3></div>
                <div class="box"><p>Status</p><h3 id="v-status"></h3></div>
                <div class="box"><p>Engine</p><h3>Good</h3></div>
            </div>

            <button class="btn">Remote Lock</button>
        </section>

    </main>

    <!-- NAV -->
    <nav class="nav">
        <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard','Dashboard')">
            <i data-lucide="home"></i><span>Home</span>
        </div>
        <div class="nav-item" data-page="vehicles" onclick="navigate('vehicles','Vehicles')">
            <i data-lucide="truck"></i><span>Fleet</span>
        </div>
    </nav>

</div>

<script src="script.js"></script>
</body>
</html>
