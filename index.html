<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FleetPro Mobile</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="mobile-frame">
    <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
            <i data-lucide="signal" size="14"></i>
            <i data-lucide="wifi" size="14"></i>
            <i data-lucide="battery" size="14"></i>
        </div>
    </div>

    <header class="main-header">
        <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Alex+Fleet&background=6366f1&color=fff" alt="Profile">
            <div>
                <p class="greeting">Welcome back,</p>
                <h2 id="header-title">Dashboard</h2>
            </div>
        </div>
        <button class="icon-btn"><i data-lucide="bell"></i><span class="notification-dot"></span></button>
    </header>

    <main class="content-scroll">
        <section id="page-dashboard" class="app-page active">
            <div class="summary-grid">
                <div class="sum-card blue">
                    <i data-lucide="truck"></i>
                    <h3>24</h3>
                    <p>Total Fleet</p>
                </div>
                <div class="sum-card green">
                    <i data-lucide="check-circle"></i>
                    <h3>18</h3>
                    <p>On Road</p>
                </div>
                <div class="sum-card orange">
                    <i data-lucide="alert-circle"></i>
                    <h3>3</h3>
                    <p>Alerts</p>
                </div>
                <div class="sum-card purple">
                    <i data-lucide="clock"></i>
                    <h3>3</h3>
                    <p>Idle</p>
                </div>
            </div>

            <div class="section-title"><h3>Active Tracking</h3><a href="#">View Map</a></div>
            <div class="map-card-preview">
                <div class="marker-info">
                    <p><strong>Truck #402</strong> • Moving</p>
                    <small>Sheikh Zayed Rd, Dubai</small>
                </div>
            </div>
        </section>

        <section id="page-vehicles" class="app-page">
            <div class="search-bar">
                <i data-lucide="search"></i>
                <input type="text" placeholder="Search by plate or driver...">
            </div>
            
            <div class="vehicle-item" onclick="showDetails('Volvo FH16')">
                <div class="v-main">
                    <div class="v-icon"><i data-lucide="truck"></i></div>
                    <div class="v-text">
                        <h4>Volvo FH16 <span class="badge">DXB 102</span></h4>
                        <p>Driver: John Wick</p>
                    </div>
                    <div class="v-status moving"></div>
                </div>
                <div class="v-metrics">
                    <div class="metric"><i data-lucide="fuel"></i> 68%</div>
                    <div class="metric"><i data-lucide="gauge"></i> 32 PSI</div>
                    <div class="metric"><i data-lucide="thermometer"></i> 88°C</div>
                </div>
            </div>
        </section>

        <section id="page-trips" class="app-page">
            <div class="trip-log">
                <div class="trip-header">
                    <span class="date">Today, 24 May</span>
                    <span class="total-km">142.5 km</span>
                </div>
                <div class="trip-card">
                    <div class="route-visual">
                        <div class="circle"></div>
                        <div class="line"></div>
                        <div class="circle-fill"></div>
                    </div>
                    <div class="route-details">
                        <div class="loc">
                            <strong>Warehouse Alpha</strong>
                            <p>08:00 AM</p>
                        </div>
                        <div class="loc">
                            <strong>Retail Center Center</strong>
                            <p>10:45 AM</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="mobile-nav">
        <button class="nav-btn active" onclick="switchPage('dashboard', 'Dashboard', this)">
            <i data-lucide="layout-grid"></i>
            <span>Home</span>
        </button>
        <button class="nav-btn" onclick="switchPage('vehicles', 'Fleet', this)">
            <i data-lucide="truck"></i>
            <span>Fleet</span>
        </button>
        <button class="nav-btn center-btn">
            <div class="plus-icon"><i data-lucide="plus"></i></div>
        </button>
        <button class="nav-btn" onclick="switchPage('trips', 'Trips', this)">
            <i data-lucide="route"></i>
            <span>Trips</span>
        </button>
        <button class="nav-btn" onclick="switchPage('alerts', 'Alerts', this)">
            <i data-lucide="bell"></i>
            <span>Alerts</span>
        </button>
    </nav>
</div>

<script src="script.js"></script>
</body>
</html>
